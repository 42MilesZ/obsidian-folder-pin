name: Release Obsidian plugin

# Trigger when a tag matching the Obsidian-required pattern is pushed.
# Tags MUST be the bare version (e.g. 0.2.1) — no leading "v" — because
# the obsidian-releases validator looks up the tag by manifest.version
# verbatim. Pre-release tags like "0.2.1-beta" are not supported.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify build artifact exists
        run: |
          test -f main.js || (echo "main.js missing after build" && exit 1)
          test -f manifest.json || (echo "manifest.json missing" && exit 1)
          test -f styles.css || (echo "styles.css missing" && exit 1)

      - name: Verify tag matches manifest.version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag ($TAG) does not match manifest.json version ($MANIFEST_VERSION)."
            echo "The Obsidian releases validator requires an exact match."
            exit 1
          fi

      - name: Create GitHub Release with plugin assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --clobber \
            main.js manifest.json styles.css
